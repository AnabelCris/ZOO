<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto | Zoológico de Quito</title>
</head>

<body>

    <h2>Formulario de Contacto</h2>
    <p>Escríbenos tus consultas sobre visitas, programas educativos o conservación.</p>

    <form action="guardar.php" method="POST">

        <!-- Nombre completo -->
        <label for="nombre">Nombre completo *</label><br>
        <input type="text" id="nombre" name="nombre" required><br><br>

        <!-- Correo -->
        <label for="correo">Correo electrónico *</label><br>
        <input type="email" id="correo" name="correo" required><br><br>

        <!-- Teléfono -->
        <label for="telefono">Teléfono (opcional)</label><br>
        <input type="tel" id="telefono" name="telefono"><br><br>

        <!-- Tipo de consulta -->
        <label for="tipo">Tipo de consulta *</label><br>
        <select id="tipo" name="tipo" required>
            <option value="">-- Seleccione --</option>
            <option value="visita">Visita General</option>
            <option value="educativo">Programa Educativo</option>
            <option value="conservacion">Conservación</option>
            <option value="donaciones">Donaciones</option>
            <option value="otro">Otro</option>
        </select><br><br>

        <!-- Mensaje -->
        <label for="mensaje">Mensaje *</label><br>
        <textarea id="mensaje" name="mensaje" rows="6" required></textarea><br><br>

        <!-- Botón -->
        <button type="submit">ENVIAR CONSULTA</button>

    </form>

</body>
</html>
